domain: ethernet
id: Ethernet_Stab_001
auto_status: auto
name: TCP 10M 稳定性测试 12h
testbed: ethernet_router_lan

description: DUT连接路由器下, DUT作为iperf server, 持续12h检测DUT接收吞吐 >= 90Mbits/sec
excel_preset: '1. ASUS RT-AC1900P

  2. network cable

  3. iperf tool

  4. PC'
excel_steps: '1. The box is connected to the route through the network cable.

  2. PC connect the same toute by Ethernet cable, PC install iperf tool

  3. test the throughput for 12hours by iPerf  tool'
excel_expected: 'RX not less than 90Mbits/sec:'

setup_hooks: []
teardown_hooks:
- step_iperf_stop_all

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态
  operation:
    api: step_enable_ethernet
- description: DUT 以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT 已通过 DHCP 获取 IPv4 地址
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 采集 DUT IP 供 iperf 使用
  operation:
    api: step_discover_network_info
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 获取 AUX 以太网 IP (iperf Tester)
  operation:
    api: step_discover_aux_eth_ip_to_router
- description: 确保 DUT 上 iperf 二进制可用
  operation:
    api: step_ensure_iperf_on_dut
    params: {}
- description: 确保 AUX iperf Tester 上 iperf 可用
  operation:
    api: step_ensure_iperf_on_aux
    params: {}

procedure:
- operation:
    description: 启动 DUT iperf server
    api: step_iperf_start
    params:
      target: dut
      role: server
      port: 5001
    wait_after: 2
- operation:
    description: 启动 AUX iperf client (daemon, 输出到文件)
    api: step_iperf_start
    params:
      target: pc
      role: client
      protocol: tcp
      bandwidth: 10M
      port: 5001
      server_ip: ${step_discover_network_info.data.ip}
      output_file: /tmp/iperf_stab001.txt
- operation:
    description: 等待 iperf 完成 (默认 12h, 可通过 IPERF_DURATION 调整)
    api: step_iperf_wait_completion
    params: {}
- operation:
    description: 读取 iperf 结果文件
    api: step_iperf_read_output
    params:
      file_path: /tmp/iperf_stab001.txt
  check:
    description: 验证吞吐 >= 90Mbits/sec
    api: check_iperf_throughput
    params:
      output: ${step_iperf_read_output.data.output}
      expected_rate: 90Mbits/sec

_source:
  sheet: Stability
