domain: ethernet
id: Ethernet_Func_040
name: 双栈网络(IPv4 + IPv6)地址获取
testbed: ethernet_router_lan
description: 验证DUT在DHCP模式下, 同时获取IPv4地址和global IPv6地址

preconditions:
  - description: 确保 DUT 处于唤醒状态再开始测试
    operation:
      api: step_ensure_awake
      params:
        max_retries: 3

  - description: DUT以太网物理链路已连通
    operation:
      api: step_ensure_ethernet_link
    check:
      api: check_ethernet_connected

  - description: DUT IP设置模式为DHCP
    operation:
      api: step_set_ip_settings_to_dhcp
    check:
      api: check_ethernet_connected

  - description: 路由器 IPv6 LAN 侧功能已启用
    operation:
      api: step_enable_router_ipv6
    check:
      api: check_ethernet_connected

procedure:
  - operation:
      description: 等待 SLAAC 分配 IPv6 地址
      automation:
        api: step_discover_network_info
        wait_after: 10
    check:
      description: 确认同时获取到IPv4和global IPv6地址
      automation:
        api: check_ethernet_dual_stack_ip_obtained
        timeout: 60
        on_failure: abort
  - operation:
      description: 清理路由器 IPv6 ULA 前缀, 恢复测试前状态
      automation:
        api: step_disable_router_ipv6
      wait_after: 5
    check:
      description: 确认以太网已连接(DUT 不受 IPv6 清理影响)
      automation:
        api: check_ethernet_connected

