domain: ethernet
id: Ethernet_Func_002
auto_status: auto
name: DHCP模式下DUT侧拔插网线后IP恢复
testbed: ethernet_router_lan
description: 验证DUT在DHCP模式下,通过ip link down模拟拔掉DUT端网线后IP消失,ip link up后能通过DHCP恢复IP地址
excel_preset: The box has successfully obtained an IP address and can access the Internet.
excel_steps: "1. the box has an IP address. can access the Internet\n2. unplug the box end network cable\n3. the box IP address disappears\n4. plug in the Internet cable. the box can regain the IP address. normal Internet access"
excel_expected: 1. Unplug the network cable box and the IP address disappears. After plugging in the Internet cable. you can regain the IP address.

setup_hooks: []
teardown_hooks: []
preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态(从上一轮异常中恢复)
  operation:
    api: step_enable_ethernet
- description: DUT 以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
procedure:
- operation:
    description: 确保 DUT 使用 DHCP 模式
    api: step_set_ip_settings_to_dhcp
  check:
    description: 确认 DHCP 模式生效
    api: check_ethernet_connected
- operation:
    description: 采集当前以太网网络信息,确认网络状态良好
    api: step_discover_network_info
  check:
    description: 确认网络信息采集完成
    api: check_ethernet_connected
- operation:
    description: 禁用 DUT 以太网接口(模拟拔掉 DUT 端网线)
    api: step_disable_ethernet
    wait_after: 3
  check:
    description: DUT 以太网已断开
    api: check_ethernet_disconnected
- operation:
    description: 启用 DUT 以太网接口(模拟重新插上网线)
    api: step_enable_ethernet
    wait_after: 5
  check:
    description: DUT 重新通过 DHCP 获取 IP 地址
    api: check_ethernet_connected
