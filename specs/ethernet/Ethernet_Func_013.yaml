domain: ethernet
id: Ethernet_Func_013
auto_status: auto
name: 输入无效静态IP时系统报错
testbed: ethernet_router_lan
description: Static IP模式下, DUT输入无效静态IP, 检测系统弹出IP settings not valid错误提示
excel_preset: Platform connect  router
excel_steps: "1. Enter set IP address interface\n2. the platform static IP address or DNS input error"
excel_expected: 1. failed to connect to the AP. and there are related error reminders

setup_hooks: []
teardown_hooks: []
preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: DUT以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
procedure:
- operation:
    description: 通过Settings UI输入无效静态IP并提交
    api: step_set_static_ip_invalid
  check:
    description: 确认系统显示IP配置无效的错误提示
    api: check_prompt_invalid_ip
    on_failure: abort
