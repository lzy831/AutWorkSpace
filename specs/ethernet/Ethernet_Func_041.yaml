domain: ethernet
id: Ethernet_Func_041
name: 双栈网络下热插拔网线后 IP 恢复
testbed: ethernet_router_lan
description: 验证双栈网络下热插拔网线后DUT能重新获取IPv4和IPv6地址

preconditions:
  - description: DUT以太网物理链路已连通
    operation:
      api: step_ensure_ethernet_link
      params:
        router_id: main_router
    check:
      api: check_ethernet_connected

  - description: DUT 设为 DHCP 模式
    operation:
      api: step_set_ip_settings_to_dhcp
    check:
      api: check_ethernet_connected

  - description: 路由器 IPv6 LAN 侧功能已启用且 DUT 已获取双栈 IP
    operation:
      api: step_enable_router_ipv6
      params:
        router_id: main_router
    check:
      api: check_ethernet_dual_stack_ip_obtained

procedure:
  - operation:
      description: 采集当前网络信息供后续步骤使用
      automation:
        api: step_discover_network_info
    check:
      description: 确认网络正常
      automation:
        api: check_ethernet_connected

  - operation:
      description: 断开DUT以太网物理链路
      automation:
        api: step_disconnect_ethernet
        params:
          mac: ${step_discover_network_info.data.mac}
          router_id: main_router
    check:
      description: 确认以太网已断开
      automation:
        api: check_network_disconnected
        params:
          type: ethernet
        on_failure: abort

  - operation:
      description: 恢复DUT以太网物理链路
      automation:
        api: step_connect_ethernet
        params:
          port: ${step_disconnect_ethernet.data.port}
          mac: ${step_discover_network_info.data.mac}
          router_id: main_router
    check:
      description: 确认以太网已恢复
      automation:
        api: check_ethernet_connected

  # eth0 link flap 后 DUT 丢失 global IPv6 地址（SLAAC 被动机制，需新 RA 触发重新生成）
  # 当前路由器不支持持续广播 RA，因此 reconnect 后必须重发
  - operation:
      description: 重新发送RA使DUT通过SLAAC获取IPv6
      automation:
        api: step_enable_router_ipv6
        params:
          router_id: main_router
        wait_after: 10
    check:
      description: 确认重新获取双栈 IP
      automation:
        api: check_ethernet_dual_stack_ip_obtained
        timeout: 60
        on_failure: abort
