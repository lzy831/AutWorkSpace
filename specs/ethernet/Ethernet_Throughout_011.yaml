domain: ethernet
id: Ethernet_Throughout_011
auto_status: manual
name: UDP 1000M RX 吞吐量测试
testbed: ethernet_router_lan

description: DUT连接路由器下, DUT作为iperf server, 检测DUT接收吞吐 >= 800Mbits/sec - DUT 不支持 1000M 网卡

setup_hooks: []
teardown_hooks:
- step_iperf_stop_all

excel_preset: ""
excel_steps: ""
excel_expected: "800Mbits/sec"

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态
  operation:
    api: step_enable_ethernet
- description: DUT 以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT 已通过 DHCP 获取 IPv4 地址
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 采集 DUT IP 供 iperf 使用
  operation:
    api: step_discover_network_info
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 获取 AUX 以太网 IP (iperf Tester)
  operation:
    api: step_discover_aux_eth_ip_to_router

procedure: []
