domain: ethernet
id: Ethernet_Stab_004
auto_status: auto
name: autosuspend + ping 稳定性测试 12h
testbed: ethernet_router_lan

description: DUT周期深睡眠+RTC唤醒, AUX持续ping记录链路状态, 最终检测以太网连接是否正常
excel_preset: "1. ASUS RT-AC1900P\n2. network cable\n3. DUT install autosuspend\n4. PC"
excel_steps: "1. The box is connected to the route through the network cable.\n2. PC connect the same toute by Ethernet cable, PC install iperf tool\n3. DUT install autosuspend apk and run autosuspend+ping for 12hours"
excel_expected: After test 12hours,DUT connect Ethernet normal

setup_hooks: []
teardown_hooks: []

preconditions:
  - description: 确保 DUT 处于唤醒状态再开始测试
    operation:
      api: step_ensure_awake
      params:
        max_retries: 3

  - description: 确保 eth0 接口处于 UP 状态
    operation:
      api: step_enable_ethernet

  - description: DUT 以太网物理链路已连通
    operation:
      api: step_ensure_router_lan_up
    check:
      api: check_ethernet_connected
      params:
        method: cmd

  - description: DUT 已通过 DHCP 获取 IPv4 地址
    operation:
      api: step_set_ip_settings_to_dhcp
    check:
      api: check_ethernet_connected
      params:
        method: cmd

  - description: 采集 DUT IP 供 ping 使用
    operation:
      api: step_discover_network_info
    check:
      api: check_ethernet_connected
      params:
        method: cmd

procedure:
  - operation:
      description: 启动 AUX ping DUT (daemon, 输出到文件)
      api: step_ping_start
      params:
        server_ip: ${step_discover_network_info.data.ip}
        output_file: /tmp/ping_stab004.txt

  - operation:
      description: DUT sleep/wake 循环 (默认12h, 深睡60s, 唤醒等待5s)
      api: step_sleep_wake_cycle
      params: {}

  - operation:
      description: 读取 ping 结果文件(仅日志记录, 不作为通过/失败判定)
      api: step_ping_read_output
      params:
        file_path: /tmp/ping_stab004.txt

  - operation:
      description: 验证 DUT 网络恢复正常(主要检测点)
      api: step_ensure_router_lan_up
    check:
      api: check_ethernet_connected
      params:
        method: cmd

_source:
  sheet: Stability
