domain: ethernet
id: Ethernet_Func_006
auto_status: auto
name: DHCP待机唤醒后网络自动恢复
testbed: ethernet_router_lan

description: DHCP模式下, DUT深度睡眠, 通过蓝牙遥控器唤醒DUT, 检测DUT获取IPv4地址并恢复网络连接
excel_preset: "The box has successfully obtained an IP address and can access the Internet."
excel_steps: "1. the box has an IP address. can access the Internet 2. the box is completely standby and wake up"
excel_expected: "After waking up. DUT can regain the IP address and access the Internet."

setup_hooks: []
teardown_hooks: []

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态
  operation:
    api: step_enable_ethernet
    params: {}
- description: DUT以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT已通过DHCP获取IPv4地址
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 蓝牙遥控器已配对并连接
  operation:
    api: step_init_bt_env
- description: 创建蓝牙遥控器设备句柄
  operation:
    api: step_create_rc_by_device_id
- description: 触发遥控器配对模式
  operation:
    api: step_trigger_rc_pairing_mode
    params:
      bluetooth_device: ${step_create_rc_by_device_id.data.bluetooth_device}
- description: 配对蓝牙遥控器
  operation:
    api: step_pair_bt_device
    params:
      bluetooth_device: ${step_create_rc_by_device_id.data.bluetooth_device}
  check:
    api: check_bt_device_connected
    params:
      bluetooth_device: ${step_create_rc_by_device_id.data.bluetooth_device}
    wait_after: 5

procedure:
- operation:
    description: 操作 DUT进入深度睡眠
    api: step_enter_deep_sleep
    wait_after: 5
  check:
    description: 确认DUT已进入深度睡眠
    api: check_dut_in_deep_sleep
- operation:
    description: 维持深睡眠一段时间
    api: step_wait_seconds
    params:
      seconds: 20
- check:
    description: 再次确认 DUT 仍处于深度睡眠(未被系统事件唤醒)
    api: check_dut_in_deep_sleep
- operation:
    description: 发送遥控器Power键, DUT离开深睡眠
    api: step_input_rc_key_power
    params:
      bluetooth_device: ${step_create_rc_by_device_id.data.bluetooth_device}
    wait_after: 10
- operation:
    description: 确保DUT完全唤醒(ADB已恢复, 自动发送POWER直至Awake)
    api: step_ensure_awake
    params:
      max_retries: 5
    wait_after: 10
  check:
    description: 确认DUT唤醒后通过DHCP恢复网络连接
    api: check_ethernet_connected
