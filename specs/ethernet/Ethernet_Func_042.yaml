domain: ethernet
id: Ethernet_Func_042
auto_status: auto
name: IPv6双栈下DUT重启后IP恢复
testbed: ethernet_router_lan
description: DUT连接IPv6路由器并正常获取双栈IP地址下, DUT断电重启, 检测DUT重新获取IPv4和IPv6地址
excel_preset: DUT connect with IPV6 route
excel_steps: "1. DUT connect with route which support IPV6\n2.Power off the DUT\n3.Power on the DUT"
excel_expected: After DUT power on,DUT can get the IPV4 and IPV6 IP address

setup_hooks: []
teardown_hooks:
- step_disable_router_ipv6
preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: DUT以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT 设为 DHCP 模式
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 启用路由器 IPv6 并确认 DUT 获取双栈 IP
  operation:
    api: step_enable_router_ipv6
  check:
    api: check_ethernet_dual_stack_ip_obtained
procedure:
- operation:
    description: 重启 DUT
    api: step_reboot_dut
    params:
      timeout: 180

- operation:
    description: 确保 eth0 处于 UP 状态（重启后可能为 down）
    api: step_enable_ethernet

- operation:
    description: 确保 DUT 以太网物理链路恢复
    api: step_ensure_router_lan_up
    check:
      api: check_ethernet_connected
      params:
        method: cmd

- operation:
    description: 重发 RA 使 DUT 通过 SLAAC 获取 IPv6
    api: step_enable_router_ipv6
    wait_after: 10

- operation:
    description: 等待 DUT SLAAC 完成 IPv6 地址配置
    api: step_wait_seconds
    params:
      seconds: 30
  check:
    description: 确认 DUT 重启后重新获取双栈 IP
    api: check_ethernet_dual_stack_ip_obtained
