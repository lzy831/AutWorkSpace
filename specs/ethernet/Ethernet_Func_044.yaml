验证 DUT 连接 IPv6 路由器后待机唤醒能重新获取双栈 IP，验证：唤醒后 IPv4 和 IPv6 地址均恢复。

Preconditions（前置条件/环境准备）
1. DUT 已连接至支持 IPv6 的路由器并获取双栈 IP。

