domain: ethernet
id: Ethernet_Func_007
name: 静态IP模式配置成功
testbed: ethernet_router_lan
description: 验证DUT通过Settings UI配置静态IP后, 以太网连接正常且获取到配置的IPv4地址

preconditions:
  - description: DUT以太网物理链路已连通
    operation:
      api: step_ensure_ethernet_link
      params:
        router_id: main_router
    check:
      api: check_ethernet_connected

  - description: DUT已处于DHCP模式且联网
    operation:
      api: step_set_ip_settings_to_dhcp
    check:
      api: check_ethernet_connected

procedure:
  - operation:
      description: 采集当前网络信息（gateway/subnet/dns/static_ip）供后续步骤使用
      automation:
        api: step_discover_network_info
        wait_after: 3
    check:
      description: 确认网络信息已采集
      automation:
        api: check_ethernet_connected

  - operation:
      description: 通过Settings UI配置静态IP（参数自动派生）
      automation:
        api: step_set_static_ip
        params:
          ip_address: ${step_discover_network_info.data.static_ip}
          gateway: ${step_discover_network_info.data.gateway}
          dns: ${step_discover_network_info.data.dns}
          prefix: 24
        wait_after: 3
    check:
      description: 确认静态IP配置成功且以太网已连接
      automation:
        api: check_ethernet_connected
        on_failure: abort
