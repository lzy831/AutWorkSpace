name: 10M FDX 模式下 DUT 与 PC 互 Ping
testbed: ethernet_direct_pc

description: 验证 10M FDX 速率下 DUT 能与对端设备(通常使用PC) 正常通信.
excel_preset: "1.PC\\n2.A Ethernet cable"
excel_steps: "1.DUT and PC IP address set to static on the same network segment (eg:DUT IP address set to 192.168.1.2,PC IP address set to 192.168.1.3)\\n2.Set PC Internet connect to 10M FDX\\n3.DUT connect with PC by Internet cable\\n4.DUT ping PC's IP address at  serial\\n5.PC  ping DUT's IP  address"
excel_expected: "1.Step 4,DUT can ping PC's IP  address\\n2.Step 5,PC can ping DUT's IP address"

