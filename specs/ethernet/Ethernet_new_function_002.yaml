domain: ethernet
id: Ethernet_new_function_002
name: 10M FDX 模式下 DUT 与 PC 互 Ping
testbed: ethernet_direct_pc
description: 验证 10M FDX 速率下 DUT 能与对端设备(通常使用PC) 正常通信.

preconditions:
  - description: 确保 DUT 处于唤醒状态再开始测试
    operation:
      api: step_ensure_awake
      params:
        max_retries: 3

  - description: Peer PC 配置静态 IP 到直连网段
    operation:
      api: step_set_peer_pc_static_ip
      params:
        ip_address: 192.168.100.1
        prefix: 24
        # iface 优先取 env params,未指定时自动侦测
    check:
      api: check_ethernet_link_up        # 直连有 carrier 但无 IP,仅验链路 UP

  - description: Peer PC 以太网设为 10M FDX
    operation:
      api: step_set_peer_pc_ethernet_mode
      params:
        speed: 10
        duplex: full
    check:
      api: check_ethernet_link_up        # 速率变更后重新协商,验证链路仍 UP

procedure:
  # 直连无 DHCP,无法走 Settings UI 配置 IP,使用 CMD 方式
  - operation:
      description: DUT 通过 CMD 配置静态 IP
      automation:
        api: step_set_static_ip
        params:
          ip_address: 192.168.100.2
          gateway: 192.168.100.1
          prefix: 24
          method: cmd
    check:
      description: 确认 DUT 静态 IP 已生效
      automation:
        api: check_ethernet_connected
        params:
          method: cmd

  - operation:
      description: DUT 与 Peer PC 同时互 Ping(验证全双工)
      automation:
        api: step_duplex_ping_test
        params:
          dut_target: 192.168.100.1
          pc_target: 192.168.100.2
          duration: 10
    check:
      description: 确认双向 Ping 均无丢包
      automation:
        api: check_network_accessible
        params:
          target: 192.168.100.1

  # 恢复步骤放末尾,不加 on_failure: abort,确保中途失败也执行
  # 见 decisions/2026-05-26-workflow-no-teardown.md
  # ⚠️ step_restore_peer_pc_ethernet 尚未完全验证,后续环境允许后补测
  - operation:
      description: 恢复 Peer PC 以太网为自协商模式
      automation:
        api: step_restore_peer_pc_ethernet
    check:
      description: 确认 Peer PC 以太网已恢复
      automation:
        api: check_ethernet_connected
        params:
          method: cmd