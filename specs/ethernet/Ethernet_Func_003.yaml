domain: ethernet
id: Ethernet_Func_003
auto_status: auto  # auto
name: DHCP模式下重启后网络自动恢复
testbed: ethernet_router_lan
description: 验证DUT在DHCP模式下重启后, 能自动重新获取IPv4地址并恢复网络连接

setup_hooks: []
teardown_hooks: []

preconditions:
  - description: 确保 DUT 处于唤醒状态再开始测试
    operation:
      api: step_ensure_awake
      params:
        max_retries: 3

  - description: DUT以太网物理链路已连通
    operation:
      api: step_ensure_router_lan_up
    check:
      api: check_ethernet_connected
      params:
        method: cmd

  - description: DUT已通过DHCP获取IPv4地址
    operation:
      api: step_set_ip_settings_to_dhcp
    check:
      api: check_ethernet_connected
      params:
        method: cmd

procedure:
  - operation:
      description: 重启DUT
      api: step_reboot_dut
      params:
        mode: normal
        timeout: 120
      wait_after: 30
    check:
      description: 重启后DUT通过DHCP恢复网络连接
      api: check_ethernet_connected