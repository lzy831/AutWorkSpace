domain: ethernet
id: Ethernet_Func_008
auto_status: auto
name: Static模式下DUT侧拔插网线后IP恢复
testbed: ethernet_router_lan

description: Static IP模式下, 拔掉DUT端网线, 检测DUT IP消失, 重新插入网线, 检测DUT Static IP恢复
excel_preset: The box has successfully obtained an IP address and can access the Internet.
excel_steps: "1. Set the DUT IP address to static
2. unplug the box end network cable
3. plug in the Internet cable. the box can regain the IP address. normal Internet access"
excel_expected: "1. Unplug the network cable box and the IP address disappears.
2.After plugging in the Internet cable. you can regain the IP address."

setup_hooks: []
teardown_hooks: []

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态(从上一轮异常中恢复)
  operation:
    api: step_enable_ethernet
- description: DUT 以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd

procedure:
- operation:
    description: 采集当前以太网网络信息
    api: step_discover_network_info
  check:
    description: 确认网络信息采集完成
    api: check_ethernet_connected
- operation:
    description: 为 DUT 配置静态 IP 地址
    api: step_set_static_ip
    params:
      ip_address: ${step_discover_network_info.data.static_ip}
      gateway: ${step_discover_network_info.data.gateway}
      dns: ${step_discover_network_info.data.dns}
  check:
    description: 确认静态 IP 模式已生效
    api: check_ethernet_ip_mode
    params:
      expected_mode: static
- operation:
    description: 禁用 DUT 以太网接口(模拟拔掉 DUT 端网线)
    api: step_disable_ethernet
    wait_after: 3
  check:
    description: DUT 以太网已断开
    api: check_ethernet_disconnected
- operation:
    description: 启用 DUT 以太网接口(模拟重新插上网线)
    api: step_enable_ethernet
    wait_after: 10
  check:
    description: DUT 恢复网络连接(静态 IP 仍有效)
    api: check_ethernet_connected
