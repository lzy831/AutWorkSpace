domain: ethernet
id: Ethernet_Func_014
auto_status: auto
name: 以太网从DHCP切换到静态IP
testbed: ethernet_router_lan

description: DHCP模式下, DUT获取IP后切换到Static IP, 检测DUT IP mode变为Static
excel_preset: The box is connected to the DHCP function device.
excel_steps: '1. Select Ethernet DHCP in the network settings to successfully obtain an IP address.

  2. Switch IP address to static'
excel_expected: '1. can get the DHCP IP address

  2. static IP settings are successful. can get IP address. normal Internet access'

setup_hooks: []
teardown_hooks: []

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态
  operation:
    api: step_enable_ethernet
    params: {}
- description: DUT以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT已通过DHCP获取IPv4地址
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd

procedure:
- operation:
    description: 采集当前网络信息供后续步骤使用
    api: step_discover_network_info
  check:
    description: 确认网络信息已采集且连接正常
    api: check_ethernet_connected
- operation:
    description: 通过Settings UI切换到静态IP模式
    api: step_set_static_ip
    params:
      ip_address: ${step_discover_network_info.data.static_ip}
      gateway: ${step_discover_network_info.data.gateway}
      dns: ${step_discover_network_info.data.dns}
      prefix: ${step_discover_network_info.data.prefix}
  check:
    description: 确认静态IP切换成功且IP地址正确
    api: check_ethernet_ip_mode
    params:
      expected_mode: static
      expected_ip: ${step_discover_network_info.data.static_ip}
    on_failure: abort
