domain: ethernet
id: Ethernet_Throughout_003
auto_status: auto
name: TCP 100M RX 吞吐量测试
testbed: ethernet_router_lan

description: DUT连接路由器下, DUT作为iperf server, 检测DUT接收吞吐 >= 90Mbits/sec

setup_hooks: []
teardown_hooks:
- step_iperf_stop_all
excel_preset: ''
excel_steps: "1. The public version is the server side, enter the command: iperf -s
2.PC enters the command for the client: iperf -c 192.168.1.3 -i 2 -w 100M -t 300"
excel_expected: 90Mbits/sec

preconditions:
- description: 确保 DUT 处于唤醒状态再开始测试
  operation:
    api: step_ensure_awake
    params:
      max_retries: 3
- description: 确保 eth0 接口处于 UP 状态
  operation:
    api: step_enable_ethernet
- description: DUT 以太网物理链路已连通
  operation:
    api: step_ensure_router_lan_up
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: DUT 已通过 DHCP 获取 IPv4 地址
  operation:
    api: step_set_ip_settings_to_dhcp
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 采集 DUT IP 供 iperf 使用
  operation:
    api: step_discover_network_info
  check:
    api: check_ethernet_connected
    params:
      method: cmd
- description: 确保 DUT 上 iperf 二进制可用 (不存在则自动下载 push)
  operation:
    api: step_ensure_iperf_on_dut
    params: {}
- description: 确保 AUX iperf Tester 上 iperf 可用
  operation:
    api: step_ensure_iperf_on_aux
    params: {}
- description: 获取 AUX 以太网 IP (iperf Tester)
  operation:
    api: step_discover_aux_eth_ip_to_router

procedure:
- operation:
    description: 启动 DUT iperf server
    api: step_iperf_start
    params:
      target: dut
      role: server
      port: 5001
    wait_after: 2
- operation:
    description: 启动 AUX iperf client (daemon, 输出到文件, 300s)
    api: step_iperf_start
    params:
      target: pc
      role: client
      protocol: tcp
      bandwidth: 100M
      duration: 300
      port: 5001
      server_ip: ${step_discover_network_info.data.ip}
      output_file: /tmp/iperf_tp003.txt
    wait_after: 310
- operation:
    description: 读取 AUX iperf client 输出文件
    api: step_iperf_read_output
    params:
      file_path: /tmp/iperf_tp003.txt
  check:
    description: 验证吞吐 >= 90Mbits/sec
    api: check_iperf_throughput
    params:
      output: ${step_iperf_read_output.data.output}
      expected_rate: 90Mbits/sec

_source:
  sheet: Performance
