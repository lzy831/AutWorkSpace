_schema: test_case_spec_v1

id: Wifi_Func_002
name: WiFi开关与扫描验证
priority: P0
domain: wifi
environment: wifi_router_lan
description: |
  验证WiFi开关功能正常: 关闭后无法搜索到AP(扫描功能停止), 
  重新打开后可正常扫描并显示AP列表

_source:
  file: wifi&BT_testcase_v1.1.xlsx
  sheet: Wifi_function
  case_id: Wifi_Func_002

preconditions:
  - description: 确认 DUT 未连接以太网线(Android TV 连以太网时自动禁用 WiFi)
    manual: QA确认DUT未插网线
    automation:
      api: check_ethernet_disconnected
      params:
        method: cmd

steps:
  - operation:
      description: 确认 WiFi 初始状态为 ON 且可扫描到 AP
      manual:
        actor: QA
        target: DUT
        action: 进入 Settings → Network & Internet → WiFi, 确认WiFi开关为ON, AP列表可见
      api: step_enable_wifi
      params:
        method: cmd
      wait_after: 5
    check:
      description: 确认WiFi ON 且有 AP 扫描结果
      manual:
        actor: QA
        target: DUT屏幕
        action: 观察WiFi设置页面显示 AVAILABLE NETWORKS 和 AP 列表
      api: check_wifi_ap_list
      params:
        expected_present: true
      timeout: 10

  - operation:
      description: 关闭 WiFi
      manual:
        actor: QA
        target: DUT
        action: 进入 Settings → Network & Internet → WiFi, 关闭WiFi开关
      api: step_disable_wifi
      params:
        method: cmd
      wait_after: 5
    check:
      description: 确认WiFi OFF 且 AP 扫描结果消失
      manual:
        actor: QA
        target: DUT屏幕
        action: 观察WiFi开关为OFF, AP列表消失
      api: check_wifi_ap_list
      params:
        expected_present: false
      timeout: 10

  - operation:
      description: 重新开启 WiFi
      manual:
        actor: QA
        target: DUT
        action: 进入 Settings → Network & Internet → WiFi, 开启WiFi开关
      api: step_enable_wifi
      params:
        method: cmd
      wait_after: 5
    check:
      description: 确认WiFi ON 且 AP 扫描恢复
      manual:
        actor: QA
        target: DUT屏幕
        action: 观察 WiFi 设置页面重新显示 AP 列表
      api: check_wifi_ap_list
      params:
        expected_present: true
      timeout: 15
      on_failure: abort

