# =============================================================================
# Ethernet Router LAN 测试环境
# =============================================================================

id: ethernet_router_lan
description: |
  以太网功能测试标准拓扑。
  DUT 通过网线连接路由器，Controller 通过 USB-ADB 直连 DUT 执行测试。
  Controller 同时通过 WiFi 连接路由器以注入网络侧操作（IPv6 RA 等）。
topology_diagram: ethernet_router_lan.mmd

# ── 物理环境要求 ──
physical_requirements:
  cable_dut_to_router: straight_through

# ── 设备清单（仅定义每个设备需要哪些参数，实际值见 params.json）──

devices:

  dut:
    type: android_ott
    role: 被测设备
    params:
      device_id:    {type: str, description: adb devices 中显示的设备标识}
      eth_iface:    {type: str, description: 以太网接口名, default: eth0}

  controller:
    type: android_device
    role: 测试执行器 + 遥控器
    description: USB-ADB 直连 DUT，WiFi 连路由器，可模拟蓝牙遥控器
    params:
      device_id:    {type: str, description: adb devices 中显示的设备标识}
      eth_iface:    {type: str, description: 以太网接口名, default: eth0}
      wifi_iface:   {type: str, description: WiFi 接口名, default: wlan0}
    profile_debug:  # 当前调试期用 Linux PC 替代 Android Controller
      type_override: linux_pc
      params:
        eth_host:   {type: str, description: 有线 IP（公司内网）}
        wifi_host:  {type: str, description: WiFi IP（路由器管理）}
        ssh:        {type: object, description: "SSH 登录凭据 (username, password)"}
        eth_iface:  {type: str, description: 有线网口名}
        wifi_iface: {type: str, description: WiFi 网口名}

  router:
    type: wifi_router
    role: 网络服务 + 测试辅助
    description: 提供 DHCP/DNS/网关，支持 SSH 远程操作（PHY 控制、reboot）
    params:
      ip:          {type: str, description: LAN IP 地址}
      ssh:         {type: object, description: "SSH 登录凭据 (username, password)"}
      model:       {type: str, description: 型号标识, 如 asus_rt_ax86u}
      wifi_ssid:   {type: str, description: WiFi SSID}
      wifi_password: {type: str, description: WiFi 密码}

  remote:
    type: bluetooth_rcu
    role: 遥控输入
    provided_by: controller

  power_relay:
    type: power_relay
    role: DUT 断电重启（预留）
    present_when: []
    params:
      device_path: {type: str, description: 串口设备路径}

aut_cloud:
  type: web_service
  role: 用例调度 + 结果收集

capabilities:
  ipv4_dhcp: true
  ipv4_static: true
  ipv6_slaac: true
  router_ssh: true
  wifi_band_5ghz: true
  bluetooth_rcu_simulate: true
